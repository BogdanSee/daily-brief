apiVersion: v1
kind: ServiceAccount
metadata:
  name: daily-brief-monitor-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: daily-brief-monitor-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: daily-brief-monitor-binding
subjects:
- kind: ServiceAccount
  name: daily-brief-monitor-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: daily-brief-monitor-role
  apiGroup: rbac.authorization.k8s.io
